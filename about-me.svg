<svg viewBox="0 0 900 400" xmlns="http://www.w3.org/2000/svg" font-family="Consolas, Monaco, monospace">
  <rect width="900" height="400" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <rect width="900" height="34" rx="12" fill="#161b22"/>
