<svg viewBox="0 0 900 340" xmlns="http://www.w3.org/2000/svg" font-family="Consolas, Monaco, monospace">
  <rect width="900" height="340" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <rect width="900" height="34" rx="12" fill="#161b22"/>
  <rect y="22" width="900" height="12" fill="#161b22"/>
  <circle cx="24" cy="17" r="6" fill="#ff5f57"/>
  <circle cx="44" cy="17" r="6" fill="#febc2e"/>
  <circle cx="64" cy="17" r="6" fill="#28c840"/>
  <text x="450" y="22" text-anchor="middle" font-size="12" fill="#8b949e">vinith_os — training dashboard</text>

  <rect x="24" y="52" width="420" height="180" rx="8" fill="#10151d" stroke="#30363d" stroke-width="1"/>
  <text x="40" y="76" font-size="12" fill="#00d4ff">loss curve</text>
  <text x="424" y="76" font-size="11" fill="#8b949e" text-anchor="end">18 epochs</text>
  <line x1="52" y1="200" x2="424" y2="200" stroke="#30363d" stroke-width="1"/>
  <line x1="52" y1="92" x2="52" y2="200" stroke="#30363d" stroke-width="1"/>
  <text x="46" y="98" font-size="9" fill="#8b949e" text-anchor="end">1.0</text>
  <text x="46" y="203" font-size="9" fill="#8b949e" text-anchor="end">0.0</text>
  <path d="M 52 100 C 120 110, 150 150, 200 170 C 260 192, 330 196, 424 197" fill="none" stroke="#00ffa3" stroke-width="2.5" stroke-dasharray="420" stroke-dashoffset="420">
    <animate attributeName="stroke-dashoffset" values="420;0;0" keyTimes="0;0.5;1" dur="7s" repeatCount="indefinite"/>
  </path>
  <circle r="4" fill="#00ffa3">
    <animateMotion path="M 52 100 C 120 110, 150 150, 200 170 C 260 192, 330 196, 424 197" keyPoints="0;1;1" keyTimes="0;0.5;1" calcMode="linear" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;1;0.4;1" keyTimes="0;0.5;0.75;1" dur="7s" repeatCount="indefinite"/>
  </circle>
  <text x="238" y="130" font-size="11" fill="#8b949e">loss: <tspan fill="#00ffa3">0.021</tspan> ▼</text>

  <rect x="468" y="52" width="196" height="180" rx="8" fill="#10151d" stroke="#30363d" stroke-width="1"/>
  <text x="484" y="76" font-size="12" fill="#a855f7">accuracy</text>
  <circle cx="566" cy="150" r="52" fill="none" stroke="#161b22" stroke-width="10"/>
  <circle cx="566" cy="150" r="52" fill="none" stroke="#a855f7" stroke-width="10" stroke-linecap="round" stroke-dasharray="327" stroke-dashoffset="327" transform="rotate(-90 566 150)">
    <animate attributeName="stroke-dashoffset" values="327;4;4" keyTimes="0;0.5;1" dur="7s" repeatCount="indefinite"/>
  </circle>
  <text x="566" y="147" text-anchor="middle" font-size="20" font-weight="bold" fill="#e6edf3" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.35;0.5;1" dur="7s" repeatCount="indefinite"/>99.4%
  </text>
  <text x="566" y="166" text-anchor="middle" font-size="10" fill="#8b949e" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.35;0.5;1" dur="7s" repeatCount="indefinite"/>val_accuracy
  </text>

  <rect x="688" y="52" width="188" height="180" rx="8" fill="#10151d" stroke="#30363d" stroke-width="1"/>
  <text x="704" y="76" font-size="12" fill="#00d4ff">status</text>
  <text x="704" y="102" font-size="11" fill="#8b949e">epochs <tspan x="860" text-anchor="end" fill="#e6edf3">18/18</tspan></text>
  <text x="704" y="126" font-size="11" fill="#8b949e">experience <tspan x="860" text-anchor="end" fill="#e6edf3">5+ yrs</tspan></text>
  <text x="704" y="150" font-size="11" fill="#8b949e">overfitting <tspan x="860" text-anchor="end" fill="#00ffa3">none</tspan></text>
  <text x="704" y="174" font-size="11" fill="#8b949e">deployment <tspan x="860" text-anchor="end" fill="#00ffa3">ready</tspan></text>
  <text x="704" y="204" font-size="11" fill="#00ffa3">● open_to_work<animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/></text>

  <text x="40" y="264" font-size="12" fill="#8b949e">core_utilization</text>
  <g font-size="11">
    <text x="40" y="290" fill="#c9d1d9">python</text>
    <rect x="130" y="280" width="300" height="10" rx="5" fill="#161b22"/>
    <rect x="130" y="280" width="0" height="10" rx="5" fill="#00ffa3"><animate attributeName="width" values="0;285;285" keyTimes="0;0.4;1" dur="7s" repeatCount="indefinite"/></rect>
    <text x="444" y="290" fill="#00ffa3">95%</text>

    <text x="40" y="316" fill="#c9d1d9">sql</text>
    <rect x="130" y="306" width="300" height="10" rx="5" fill="#161b22"/>
    <rect x="130" y="306" width="0" height="10" rx="5" fill="#00d4ff"><animate attributeName="width" values="0;270;270" keyTimes="0;0.45;1" dur="7s" repeatCount="indefinite"/></rect>
    <text x="444" y="316" fill="#00d4ff">90%</text>

    <text x="500" y="290" fill="#c9d1d9">agentic</text>
    <rect x="580" y="280" width="240" height="10" rx="5" fill="#161b22"/>
    <rect x="580" y="280" width="0" height="10" rx="5" fill="#a855f7"><animate attributeName="width" values="0;204;204" keyTimes="0;0.5;1" dur="7s" repeatCount="indefinite"/></rect>
    <text x="832" y="290" fill="#a855f7">85%</text>

    <text x="500" y="316" fill="#c9d1d9">aws/ops</text>
    <rect x="580" y="306" width="240" height="10" rx="5" fill="#161b22"/>
    <rect x="580" y="306" width="0" height="10" rx="5" fill="#e0af68"><animate attributeName="width" values="0;192;192" keyTimes="0;0.55;1" dur="7s" repeatCount="indefinite"/></rect>
    <text x="832" y="316" fill="#e0af68">80%</text>
  </g>
</svg>
